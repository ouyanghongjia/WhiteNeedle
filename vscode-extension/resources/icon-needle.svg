<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- needle body: diagonal line from top-right to bottom-left -->
  <line x1="19" y1="3" x2="7" y2="15" />
  <!-- needle tip: sharper point extending further -->
  <line x1="7" y1="15" x2="4" y2="20" />
  <!-- needle eye: small oval at the top end -->
  <ellipse cx="20.2" cy="2.2" rx="1.5" ry="0.8" transform="rotate(-45 20.2 2.2)" />
  <!-- thread: a loose curve from the eye -->
  <path d="M21.5 1 C23 3, 21 5.5, 18.5 4.5" />
  <!-- injection marks: small dashes near the tip suggesting code injection -->
  <line x1="9" y1="17" x2="11" y2="15" />
  <line x1="6" y1="18" x2="8" y2="16" />
</svg>
